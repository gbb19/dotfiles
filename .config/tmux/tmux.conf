# --- Prefix ---
unbind C-b
# Set new prefix to Ctrl+a
set -g prefix C-a
bind C-a send-prefix

bind-key ` last-window

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -as terminal-overrides ',*:smcup@:rmcup@'
set -ga terminal-overrides ',*:UTF-8'
set -s escape-time 0 # Prevent escape key delay and stabilize cursor updates in Neovim

# --- Mouse ---
setw -g mouse on

# --- Copy mode (vi) ---
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

# --- History ---
set-option -g history-limit 200000

# --- Focus / stability ---
set-option -g focus-events on

# --- Windows ---
set -g base-index 1
set-option -q renumber-windows on

# --- Navigation ---
bind-key -r k select-pane -U
bind-key -r j select-pane -D
bind-key -r h select-pane -L
bind-key -r l select-pane -R

# --- Core bindings ---
bind-key x kill-pane
bind-key r source-file ~/.config/tmux/tmux.conf
bind-key S setw synchronize-panes
bind-key -r A attach-session -c "#{pane_current_path}"

# --- Clipboard / passthrough ---
set -s set-clipboard on
set -g allow-passthrough on

# --- Theme switch (kept from your original) ---
if-shell "[ -f ~/.config/zsh/set-light-theme ]" \
  "source-file ~/.config/tmux/light-theme.conf" \
  "source-file ~/.config/tmux/dark-theme.conf"

# --- Status bar (your original theme unchanged) ---
set-option -g status-interval 60
set-option -g status-justify centre
set-option -g status-left-length 80
set-option -g status-right-length 40

set-option -g status-left " 󱫋 #H   #(uname -r | cut -c 1-6)   #S    #(pwd | sed 's|^$HOME|~|')"
set-option -g status-right "%l:%M %p %a %b %d "

# --- Safety ---
set-option -g allow-rename off

set -as terminal-overrides ',xterm-256color:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',xterm-256color:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# --- Plugins (TPM) ---
# How to use session save/restore:
# - Save manually:    Prefix + Ctrl-s (Ctrl-a -> Ctrl-s)
# - Restore manually: Prefix + Ctrl-r (Ctrl-a -> Ctrl-r)
# - Auto-save:        Background auto-save runs every 15 minutes.
# - Auto-restore:     Automatically restores state when tmux server starts.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


# --- Resurrect & Continuum settings ---
# Restore Neovim sessions if Session.vim exists
set -g @resurrect-strategy-nvim 'session'
# Capture and restore pane contents
set -g @resurrect-capture-pane-contents 'on'
# Disable auto-restore on tmux start (use Prefix + Ctrl-r to restore manually)
set -g @continuum-restore 'off'
# Auto-save interval in minutes (default 15)
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
